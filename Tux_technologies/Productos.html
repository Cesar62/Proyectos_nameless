<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagenes/rostro_tux_T.png">
    <link rel="stylesheet" href="../src/output.css">
    <title>Productos</title>
</head>

<body>
    <!--Navbar -->
    <nav class="flex flex-row z-10 fixed bg-black p-2 w-full text-white font-bold text-xl">
        <div class=" flex basis-full  justify-start">
            <img src="imagenes/Logo_tux_technologies.jpeg" alt="Tux Technologies logo" class="ml-20 inline-30">
        </div>
        <div class=" flex basis-full justify-center"></div>
        <div class="flex flex-row basis-full items-center justify-end gap-4 tracking-widest mr-10">
            <button class="md:hidden cursor-pointer" onclick="toggleMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>
            <button
                class="hover:text-gray-600 hover:bg-white cursor-pointer  rounded-lg p-2 md:visible invisible md:inline-block hidden nav-link">CATEGORÍAS</button>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center cursor-pointer">
                <img src="imagenes/iconos/icono_persona.svg">
            </div>
        </div>
    </nav>

    <!-- Espacio-->
    <div id="Inicio" class="h-15"></div>

    <!-- Productos -->
    <div class="flex flex-row justify-start text-white h-screen">
        <!-- filtrar -->
        <div class="flex flex-col place-items-center place-content-center gap-4 p-2 bg-gray-300 w-[15%]">
            <div class="fixed basis-full w-50 p-2 bg-black/60">
                <h1 class="text-lg font-bold">Filtrar</h1>
                <input type="checkbox" name=""> <label for="">Filtrar</label>
            </div>
        </div>

        <!-- seccion de productos -->
        <div class="flex flex-col items-center gap-4 p-6  bg-slate-600 w-[85%] p-6">
            <h1 class="text-2xl font-bold">PRODUCTOS</h1>
            <div class="flex flex-row flex-wrap items-center justify-center gap-4">
                <div class="flex flex-col items-center size-50 bg-black rounded-lg p-2 overflow-y-auto block">
                    <p>hola</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
