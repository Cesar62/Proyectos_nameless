<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagenes/rostro_tux_T.png">
    <link rel="stylesheet" href="../src/output.css">
    <title>Productos</title>
</head>

<body>
    <!--Navbar -->
    <nav class="flex flex-row z-10 fixed bg-black p-2 w-full text-white font-bold text-xl">
        <div class=" flex basis-full  justify-start">
            <img src="imagenes/Logo_tux_technologies.jpeg" alt="Tux Technologies logo" class="ml-20 inline-30">
        </div>
        <div class=" flex basis-full justify-center"></div>
        <div class="flex flex-row basis-full items-center justify-end gap-4 tracking-widest mr-10">
            <button class="md:hidden cursor-pointer" onclick="toggleMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>
            <a href="#Inicio" data-target="Inicio"
                class="hover:text-gray-600 hover:bg-white rounded-lg p-2 md:visible invisible md:inline-block hidden nav-link">INICIO</a>
            <button
                class="hover:text-gray-600 hover:bg-white cursor-pointer  rounded-lg p-2 md:visible invisible md:inline-block hidden nav-link">CATEGORÍAS</button>
            <a href="#Contacto" data-target="Contacto"
                class="hover:text-gray-600 hover:bg-white rounded-lg p-2 md:visible invisible md:inline-block hidden nav-link">CONTACTO</a>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center cursor-pointer">
                <img src="imagenes/iconos/icono_persona.svg">
            </div>
        </div>
    </nav>

    <!-- Espacio-->
    <div id="Inicio" class="h-15"></div>

    <!-- Productos -->
    <div class="flex flex-row justify-center bg-green-600 text-white"> 
        <!-- seccion de filtrar -->
        <div class="flex flex-row flex-wrap bg-grey-600 justify-center gap-x-2 w-[15%] p-2">
            <h1 class="text-lg font-bold">Filtrar</h1>
        </div>
        <!-- seccion de productos -->
        <div class="flex flex-row flex-wrap  bg-blue-600 w-[85%] p-6">
            <p>hola</p>
        </div>
    </div>
</body>

</html>
